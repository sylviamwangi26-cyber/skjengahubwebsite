<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SK Jenga Hub | Contact Us</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { brandBlue: '#0B1A30', brandOrange: '#F97316' },
                    fontFamily: { sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #F8FAFC; }
        .glass-nav { background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); border-bottom: 1px solid #e2e8f0; }
        .contact-card { transform-style: preserve-3d; transition: transform 0.3s ease; }
        .contact-card:hover { transform: translateY(-5px) scale(1.02); box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <nav class="glass-nav fixed w-full z-50 h-20 flex items-center">
        <div class="max-w-7xl mx-auto px-4 w-full flex justify-between items-center">
            <a href="index.html" class="font-extrabold text-2xl text-brandBlue flex items-center gap-2">
                <img src="logo.jpeg" alt="Logo" class="h-10 w-auto object-contain rounded"> SK Jenga Hub
            </a>
            <div class="hidden md:flex space-x-8 items-center">
                <a href="index.html" class="text-slate-600 hover:text-brandBlue font-medium transition">Home</a>
                <a href="services.html" class="text-slate-600 hover:text-brandBlue font-medium transition">Services</a>
                <a href="gallery.html" class="text-slate-600 hover:text-brandBlue font-medium transition">Gallery</a>
                <a href="contact.html" class="text-brandBlue font-bold border-b-2 border-brandOrange">Contact Us</a>
                <a href="apply.html" class="bg-brandOrange text-white px-6 py-2 rounded-full font-bold shadow-lg hover:bg-orange-600 transition">Get Verified</a>
            </div>
        </div>
    </nav>

    <section class="pt-32 pb-20 px-4 max-w-4xl mx-auto">
        <div class="text-center mb-16">
            <h1 class="text-5xl font-extrabold text-brandBlue mb-4">Get In Touch</h1>
            <p class="text-xl text-slate-600">Have a question? We're here to help bridge the gap.</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="contact-card bg-white p-8 rounded-2xl border border-slate-200">
                <i class="fa-brands fa-whatsapp text-5xl text-green-500 mb-6"></i>
                <h3 class="text-2xl font-bold text-brandBlue mb-2">WhatsApp Us</h3>
                <p class="text-slate-600 mb-4">Direct, fast, and authentic support.</p>
                <a href="https://wa.me/254700134177" target="_blank" class="text-brandOrange font-bold text-lg hover:underline">+254 700 134 177</a>
            </div>
            
            <div class="contact-card bg-white p-8 rounded-2xl border border-slate-200">
                <i class="fa-solid fa-envelope text-5xl text-brandBlue mb-6"></i>
                <h3 class="text-2xl font-bold text-brandBlue mb-2">Email Us</h3>
                <p class="text-slate-600 mb-4">For official inquiries and support.</p>
                <a href="mailto:skjengahub@gmail.com" class="text-brandOrange font-bold text-lg hover:underline">skjengahub@gmail.com</a>
            </div>
        </div>
    </section>
</body>
</html>
